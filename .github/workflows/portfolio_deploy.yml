name: portfolio

on:
    push:
        branches: [main]

permission:
    pages: write
    id_token: write        
jobs:
    deploy:
        runs-on: ubuntu-latest

        environments:
            name: github-pages
            url: ${{steps.deployment.output.page.url}}

        steps:
            - name: checkout code
              uses: actions/checkout@v4

             -name: setup guthub pages 
              uses: actions/configure-pages-pages@v4
              
             -name: upload static files
              uses: actions/upload-pages-artifacts@v4

             -name: deploy to github pages
              uses: actions/deploy-pages@v4 
                